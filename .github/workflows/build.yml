name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac:arm64
            artifact: mac-arm64
          - os: windows-latest
            script: build:win:x64
            artifact: win-x64
          - os: ubuntu-latest
            script: build:linux:deb
            artifact: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qury-editor-${{ matrix.artifact }}
          path: public/landing-page/*

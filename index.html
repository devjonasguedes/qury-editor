<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Editor</title>
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="node_modules/codemirror/lib/codemirror.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">SQL Editor</div>
        <div class="status-area">
          <div class="conn-status" id="connStatus">Desconectado</div>
          <select id="dbSelect" class="db-select hidden"></select>
          <span id="connectSpinner" class="spinner hidden"></span>
          <button id="exitBtn" class="secondary hidden">Desconectar</button>
        </div>
      </header>

      <section class="connect-screen" id="connectScreen">
        <div class="connect-panel">
          <div class="row">
          <label>Tipo</label>
          <select id="dbType">
            <option value="mysql">MySQL</option>
            <option value="postgresql">PostgreSQL</option>
          </select>

          <label>Host</label>
          <input id="host" placeholder="localhost" />

          <label>Porta</label>
          <input id="port" placeholder="3306 / 5432" />

          <label>Usuário</label>
          <input id="user" />

          <label>Senha</label>
          <input id="password" type="password" />

          <label>Database</label>
          <input id="database" placeholder="opcional" />

          <label>Nome p/ salvar</label>
          <input id="saveName" placeholder="ex: Produção" />

          <div class="actions">
            <button id="connectBtn">Conectar</button>
            <button id="saveBtn">Salvar</button>
            <button id="clearFormBtn" class="secondary">Limpar</button>
            <button id="cancelEditBtn" class="secondary hidden">Cancelar</button>
          </div>
        </div>

        </div>
        <div class="saved-card">
          <div class="saved-header">Conexões salvas</div>
          <div id="savedList" class="saved-list"></div>
        </div>
      </section>

      <section class="main hidden" id="mainScreen">
        <aside class="tables">
          <div class="panel-title">Database</div>
          <input id="tableSearch" class="table-search" placeholder="Buscar tabela" />
          <div id="tableList"></div>
        </aside>

        <div class="workspace">
          <div class="editor">
            <div class="tab-bar" id="tabBar">
              <button id="newTabBtn" class="icon-btn tab-add" title="Nova aba (⌘T)"><i class="bi bi-plus"></i></button>
            </div>
            <div class="editor-toolbar">
              <div class="editor-title">Query <span id="querySpinner" class="spinner hidden"></span></div>
              <div class="editor-actions">
                <select id="limitSelect" class="limit-select" title="Limite padrão">
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="200">200</option>
                  <option value="500" selected>500</option>
                  <option value="1000">1000</option>
                  <option value="none">Sem limite</option>
                </select>
                <button id="formatBtn" class="icon-btn format-btn" title="Formatar (⌥⇧F)"><i class="bi bi-braces"></i></button>
                <button id="runSelectionBtn" class="icon-btn run-selection-btn" title="Executar seleção (⇧⏎)"><i class="bi bi-cursor-text"></i></button>
                <button id="runBtn" class="icon-btn run-btn" title="Executar (⌘⏎)"><i class="bi bi-lightning-charge-fill"></i></button>
              </div>
            </div>
            <div class="editor-body">
              <textarea id="query" placeholder="Digite sua query SQL"></textarea>
            </div>
          </div>
          <div class="results" id="resultsPanel">
            <table id="resultsTable"></table>
          </div>
        </div>
      </section>
    </div>

    <script src="node_modules/codemirror/lib/codemirror.js"></script>
    <script src="node_modules/codemirror/mode/sql/sql.js"></script>
    <script src="node_modules/sql-formatter/dist/sql-formatter.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
